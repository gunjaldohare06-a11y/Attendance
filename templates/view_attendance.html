<!DOCTYPE html>
<html>
<head>
<title>Attendance Records</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<div class="card">

<h2>Attendance Records</h2>

<table>

<tr>
<th>Name</th>
<th>Roll No</th>
<th>Date</th>
<th>Status</th>
</tr>

{% for row in records %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>
